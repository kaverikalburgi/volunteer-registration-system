<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">
    <meta name="viewport"
          content="width=device-width, initial-scale=1.0">

    <title>Login</title>

    <link rel="stylesheet"
          href="../css/style.css">

</head>

<body>

    <div class="form-container">

        <form
            id="loginForm"
            class="glass-form">

            <h2>Volunteer Login</h2>

            <input
                type="email"
                id="email"
                placeholder="Email Address"
                required>

            <input
                type="password"
                id="password"
                placeholder="Password"
                required>

            <button type="submit">
                Login
            </button>

            <p>
                Don't have an account?
                <a href="register.html">
                    Register
                </a>
            </p>

        </form>

    </div>

    <script src="../js/login.js"></script>

</body>
</html>
